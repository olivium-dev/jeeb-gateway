version: "3.9"

services:
  jeeb-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5201:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Otel__Endpoint=http://otel-collector:4317
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
