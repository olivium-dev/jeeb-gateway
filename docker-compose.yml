version: "3.9"

services:
  jeeb-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5201:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Otel__Endpoint=http://otel-collector:4317
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=jeeb;Username=jeeb;Password=jeeb
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=jeeb
      - POSTGRES_USER=jeeb
      - POSTGRES_PASSWORD=jeeb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeeb -d jeeb"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  postgres-data:
