name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/JeebGateway/JeebGateway.csproj

      - name: Build
        run: dotnet build src/JeebGateway/JeebGateway.csproj -c Release --no-restore

      - name: Restore test project
        run: dotnet restore tests/JeebGateway.IntegrationTests/JeebGateway.IntegrationTests.csproj

      - name: Test
        run: dotnet test tests/JeebGateway.IntegrationTests/JeebGateway.IntegrationTests.csproj -c Release --no-restore --verbosity normal --logger "trx;LogFileName=tests.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/**/TestResults/*.trx

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t jeeb-gateway:ci-${{ github.sha }} .

      - name: Verify health check endpoint exists in image
        run: |
          docker run -d --name gw-smoke -p 18080:8080 \
            -e JeebJwt__SigningKey="ci-smoke-signing-key-not-for-prod-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa" \
            -e JeebJwt__PhonePepper="ci-smoke-phone-pepper-not-for-prod-aaaaaaa" \
            -e Services__Auth__BaseUrl="http://auth-service:8080" \
            -e Services__Chat__BaseUrl="http://chat-service:8080" \
            -e Services__UserManagement__BaseUrl="http://user-management:8080" \
            -e Services__Wallet__BaseUrl="http://wallet-service:8080" \
            -e Services__Matching__BaseUrl="http://matching:8080" \
            -e Services__Notification__BaseUrl="http://notification-service:8080" \
            -e Services__Geolocation__BaseUrl="http://geolocation-service:8080" \
            -e Services__PushNotification__BaseUrl="http://push-notification:8080" \
            -e Services__Delivery__BaseUrl="http://delivery-service:8080" \
            jeeb-gateway:ci-${{ github.sha }}
          sleep 5
          curl -sf http://localhost:18080/health/live || (docker logs gw-smoke && exit 1)
          docker stop gw-smoke
          docker rm gw-smoke
