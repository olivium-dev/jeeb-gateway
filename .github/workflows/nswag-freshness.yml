name: NSwag client freshness (JEB-67 / T-BE-031 AC5)

# AC5: NSwag freshness check fails CI when downstream OpenAPI has drifted
# from committed clients. This workflow regenerates the typed NSwag clients
# from the pinned `contracts/*.openapi.json` specs and fails the PR if the
# regenerated output differs from what is committed.
#
# Two-mode design:
#   * push / pull_request → regenerate from PINNED specs only (offline, fast).
#     Catches contract drift caused by a hand-edit to a spec without
#     regenerating the client, or vice versa. Always green if both are
#     committed together.
#   * schedule (daily)   → ALSO refetch each upstream spec, regenerate, and
#     fail if any spec or client moved. Catches drift caused by a downstream
#     team shipping a breaking change to its OpenAPI without telling us.
#     Opens an issue on failure so the gateway owner can patch.

on:
  push:
    branches: [main]
    paths:
      - "src/JeebGateway/contracts/**"
      - "src/JeebGateway/Services/Generated/**"
      - "src/JeebGateway/scripts/regenerate-clients.sh"
      - ".github/workflows/nswag-freshness.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/JeebGateway/contracts/**"
      - "src/JeebGateway/Services/Generated/**"
      - "src/JeebGateway/scripts/regenerate-clients.sh"
      - ".github/workflows/nswag-freshness.yml"
  schedule:
    # Daily 06:00 UTC — early enough that the gateway owner sees drift
    # before mobile QA starts the day.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      refetch:
        description: "Refetch live OpenAPI from each upstream (true) or use pinned specs (false)?"
        required: false
        default: "false"

jobs:
  freshness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install NSwag CLI
        run: dotnet tool install -g NSwag.Tool --version 14.2.0

      - name: Install jq (script dependency)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Decide mode
        id: mode
        run: |
          mode="pinned"
          if [[ "${{ github.event_name }}" == "schedule" ]] \
             || [[ "${{ github.event.inputs.refetch }}" == "true" ]]; then
            mode="refetch"
          fi
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "Running in ${mode} mode."

      # Pinned mode: trick the script into NOT trying to reach localhost by
      # pointing every URL at a file:// scheme it cannot fetch. The script
      # is designed to continue using pinned specs in that case.
      - name: Regenerate clients (pinned)
        if: steps.mode.outputs.mode == 'pinned'
        env:
          AUTH_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
          CHAT_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
          USER_MANAGEMENT_OPENAPI_URL: "http://127.0.0.1:1/skip"
          WALLET_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
          MATCHING_OPENAPI_URL: "http://127.0.0.1:1/skip"
          NOTIFICATION_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
          GEOLOCATION_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
          PUSH_NOTIFICATION_OPENAPI_URL: "http://127.0.0.1:1/skip"
          DELIVERY_SERVICE_OPENAPI_URL: "http://127.0.0.1:1/skip"
        run: bash src/JeebGateway/scripts/regenerate-clients.sh || true

      - name: Regenerate clients (refetch from live upstreams)
        if: steps.mode.outputs.mode == 'refetch'
        run: bash src/JeebGateway/scripts/regenerate-clients.sh || true

      - name: Diff committed vs regenerated
        id: diff
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain src/JeebGateway/contracts src/JeebGateway/Services/Generated 2>/dev/null)" ]]; then
            echo "::group::Drift detected"
            git diff --stat src/JeebGateway/contracts src/JeebGateway/Services/Generated || true
            git diff src/JeebGateway/contracts src/JeebGateway/Services/Generated || true
            echo "::endgroup::"
            echo "drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No drift — committed NSwag clients match the pinned/upstream specs."
          fi

      - name: Fail on drift (pinned mode = PR-blocking)
        if: steps.mode.outputs.mode == 'pinned' && steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::AC5 violation — committed NSwag clients/specs diverge from regenerated output."
          echo "Run: bash src/JeebGateway/scripts/regenerate-clients.sh"
          echo "Commit both the spec(s) and the regenerated *.cs together."
          exit 1

      - name: Open issue on scheduled drift
        if: steps.mode.outputs.mode == 'refetch' && steps.diff.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[JEB-67 AC5] Daily NSwag freshness check found drift on ${today}`,
              body: [
                'The scheduled daily NSwag freshness check detected drift between',
                'a committed downstream spec and what the upstream service currently',
                'publishes. Inspect the workflow run for the diff:',
                '',
                `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Action items:',
                '1. Identify which upstream service moved.',
                '2. Coordinate with the downstream owner (additive vs breaking).',
                '3. Regenerate the local client via `bash src/JeebGateway/scripts/regenerate-clients.sh`.',
                '4. Open a PR with the new spec + generated client together.',
              ].join('\n'),
              labels: ['nswag-drift', 'parent:JEB-67'],
            });
