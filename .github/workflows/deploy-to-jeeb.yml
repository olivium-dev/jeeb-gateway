# DEV Jeeb gateway deployment. The gateway is the sole public ingress; all
# credentials are materialized in a versioned Swarm secret mounted directly as
# ASP.NET Core's appsettings.Production.json.

name: Deploy to Jeeb

on:
  workflow_dispatch:
    inputs:
      expected_commit: { description: 'Exact 40-hex commit that this DEV run must deploy', required: true }
      service_name:    { description: 'Swarm service name', required: true, default: 'jeeb-gateway' }
      internal_port:   { description: 'Container port', required: true, default: '8080' }
      external_port:   { description: 'Published DEV gateway port', required: true, default: '10000' }
      health_path:     { description: 'HTTP health path', required: true, default: '/api/health' }
      server_hostname: { description: 'Cloudflare tunnel hostname', required: true, default: 'jeeb-ssh.fds-1.com' }
      server_user:     { description: 'SSH user', required: true, default: 'ec2-user' }
      jwt_issuer:       { description: 'JWT issuer', required: true, default: 'https://jeeb.fds-1.com' }
      jwt_audience:     { description: 'JWT audience', required: true, default: 'jeeb-mobile' }
      chat_base_url:    { description: 'Chat base URL', required: true, default: 'http://192.168.2.50:10028' }
      user_management_base_url: { description: 'User-management base URL', required: true, default: 'http://192.168.2.50:10001' }
      wallet_base_url: { description: 'Wallet base URL', required: true, default: 'http://192.168.2.50:10014' }
      notification_base_url: { description: 'Notification base URL', required: true, default: 'http://192.168.2.50:10026' }
      push_notification_base_url: { description: 'Private push base URL', required: true, default: 'http://192.168.2.50:10040' }
      otp_base_url: { description: 'OTP base URL', required: true, default: 'http://192.168.2.50:10037' }
      matching_base_url: { description: 'Matching base URL', required: true, default: 'http://192.168.2.50:10025' }
      delivery_base_url: { description: 'Delivery base URL', required: true, default: 'http://192.168.2.50:10055' }
      otp_application_id: { description: 'Jeeb ApplicationRef', required: true, default: '0d51afe1-499f-4a29-a55a-36d2dd223b05' }
      kyc_base_url: { description: 'KYC base URL', required: true, default: 'http://192.168.2.50:10074' }
      cdn_base_url: { description: 'CDN base URL', required: true, default: 'http://192.168.2.50:10072' }
      feature_flags:
        description: 'DEV flag overlay: ConversationAutoCreate, UseUpstreamKyc/Cdn/Offer/Delivery/Chat, Heartbeat'
        required: false
        default: ''
      whisper_fake:
        description: 'Use deterministic fake Whisper transcription'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      durable_requests:
        description: 'Enable durable request create'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      dev_endpoints:
        description: 'DEV-only /dev routes; preserve keeps the running non-secret flag'
        required: false
        default: 'preserve'
        type: choice
        options: ['preserve', 'true', 'false']
      swagger_ui:
        description: 'Admin-gated Swagger; preserve keeps the running non-secret flag'
        required: false
        default: 'preserve'
        type: choice
        options: ['preserve', 'true', 'false']

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-jeeb-jeeb-gateway
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: DEV
    env:
      DEPLOY_REGISTRY: ghcr.io
      IMAGE_REPOSITORY: olivium-dev/jeeb-gateway
      DEPLOY_SERVICE_NAME: ${{ inputs.service_name }}
      DEPLOY_INTERNAL_PORT: ${{ inputs.internal_port }}
      DEPLOY_EXTERNAL_PORT: ${{ inputs.external_port }}
      DEPLOY_HEALTH_PATH: ${{ inputs.health_path }}
      DEPLOY_SERVER_HOSTNAME: ${{ inputs.server_hostname }}
      DEPLOY_SERVER_USER: ${{ inputs.server_user }}
      JWT_ISSUER: ${{ inputs.jwt_issuer }}
      JWT_AUDIENCE: ${{ inputs.jwt_audience }}
      CHAT_BASE_URL: ${{ inputs.chat_base_url }}
      USER_MANAGEMENT_BASE_URL: ${{ inputs.user_management_base_url }}
      WALLET_BASE_URL: ${{ inputs.wallet_base_url }}
      NOTIFICATION_BASE_URL: ${{ inputs.notification_base_url }}
      PUSH_BASE_URL: ${{ inputs.push_notification_base_url }}
      OTP_BASE_URL: ${{ inputs.otp_base_url }}
      MATCHING_BASE_URL: ${{ inputs.matching_base_url }}
      DELIVERY_BASE_URL: ${{ inputs.delivery_base_url }}
      OTP_APPLICATION_ID: ${{ inputs.otp_application_id }}
      KYC_BASE_URL: ${{ inputs.kyc_base_url }}
      CDN_BASE_URL: ${{ inputs.cdn_base_url }}
      FEATURE_FLAGS: ${{ inputs.feature_flags }}
      WHISPER_FAKE: ${{ inputs.whisper_fake }}
      DURABLE_REQUESTS: ${{ inputs.durable_requests }}
      DEV_ENDPOINTS: ${{ inputs.dev_endpoints }}
      SWAGGER_UI: ${{ inputs.swagger_ui }}
      APPSETTINGS_SECRET_PREFIX: jeeb_gateway_appsettings
      APPSETTINGS_SECRET_TARGET: /app/appsettings.Production.json
      PRIVATE_PUSH_PORT: '10040'
      DEPLOY_DB_NAME: jeeb
      EXPECTED_COMMIT: ${{ inputs.expected_commit }}
      EXPECTED_REPOSITORY: olivium-dev/jeeb-gateway
      EXPECTED_REF: refs/heads/codex/fix-jeeber-push-e2e-20260718
    steps:
      - name: Validate locked DEV deployment inputs
        run: |
          set -euo pipefail
          fail() { echo "::error::$1"; exit 1; }
          [[ "$DEPLOY_REGISTRY" == ghcr.io ]] || fail "registry is not allowlisted"
          [[ "$GITHUB_REPOSITORY" == "$EXPECTED_REPOSITORY" ]] || fail "repository is not allowlisted"
          [[ "$GITHUB_REF" == "$EXPECTED_REF" ]] || fail "branch is not allowlisted"
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]] || fail "expected_commit is invalid"
          [[ "$EXPECTED_COMMIT" == "$GITHUB_SHA" ]] || fail "expected_commit does not match GITHUB_SHA"
          [[ "$IMAGE_REPOSITORY" == olivium-dev/jeeb-gateway ]] || fail "image is not allowlisted"
          [[ "$DEPLOY_SERVICE_NAME" == jeeb-gateway ]] || fail "service_name is not allowlisted"
          [[ "$DEPLOY_INTERNAL_PORT" == 8080 ]] || fail "internal_port is not allowlisted"
          [[ "$DEPLOY_EXTERNAL_PORT" == 10000 ]] || fail "external_port is not allowlisted"
          [[ "$DEPLOY_HEALTH_PATH" == /api/health ]] || fail "health_path is not allowlisted"
          [[ "$DEPLOY_SERVER_HOSTNAME" == jeeb-ssh.fds-1.com ]] || fail "server_hostname is not allowlisted"
          [[ "$DEPLOY_SERVER_USER" == ec2-user ]] || fail "server_user is not allowlisted"
          [[ "$JWT_ISSUER" == https://jeeb.fds-1.com ]] || fail "jwt_issuer is not allowlisted"
          [[ "$JWT_AUDIENCE" == jeeb-mobile ]] || fail "jwt_audience is not allowlisted"
          [[ "$CHAT_BASE_URL" == http://192.168.2.50:10028 ]] || fail "chat_base_url is not allowlisted"
          [[ "$USER_MANAGEMENT_BASE_URL" == http://192.168.2.50:10001 ]] || fail "user_management_base_url is not allowlisted"
          [[ "$WALLET_BASE_URL" == http://192.168.2.50:10014 ]] || fail "wallet_base_url is not allowlisted"
          [[ "$NOTIFICATION_BASE_URL" == http://192.168.2.50:10026 ]] || fail "notification_base_url is not allowlisted"
          [[ "$PUSH_BASE_URL" == http://192.168.2.50:10040 ]] || fail "push_notification_base_url is not allowlisted"
          [[ "$OTP_BASE_URL" == http://192.168.2.50:10037 ]] || fail "otp_base_url is not allowlisted"
          [[ "$MATCHING_BASE_URL" == http://192.168.2.50:10025 ]] || fail "matching_base_url is not allowlisted"
          [[ "$DELIVERY_BASE_URL" == http://192.168.2.50:10055 ]] || fail "delivery_base_url is not allowlisted"
          [[ "$OTP_APPLICATION_ID" == 0d51afe1-499f-4a29-a55a-36d2dd223b05 ]] || fail "otp_application_id is not allowlisted"
          [[ "$KYC_BASE_URL" == http://192.168.2.50:10074 ]] || fail "kyc_base_url is not allowlisted"
          [[ "$CDN_BASE_URL" == http://192.168.2.50:10072 ]] || fail "cdn_base_url is not allowlisted"
          [[ "$DEPLOY_DB_NAME" == jeeb ]] || fail "database name is not allowlisted"
          [[ "$WHISPER_FAKE" == true || "$WHISPER_FAKE" == false ]] || fail "whisper_fake is invalid"
          [[ "$DURABLE_REQUESTS" == true || "$DURABLE_REQUESTS" == false ]] || fail "durable_requests is invalid"
          [[ "$DEV_ENDPOINTS" == preserve || "$DEV_ENDPOINTS" == true || "$DEV_ENDPOINTS" == false ]] || fail "dev_endpoints is invalid"
          [[ "$SWAGGER_UI" == preserve || "$SWAGGER_UI" == true || "$SWAGGER_UI" == false ]] || fail "swagger_ui is invalid"
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]] || fail "GITHUB_SHA is invalid"
          [[ "$GITHUB_RUN_ID" =~ ^[0-9]+$ && "$GITHUB_RUN_ATTEMPT" =~ ^[0-9]+$ ]] || fail "run identity is invalid"
          if [[ -n "$FEATURE_FLAGS" ]]; then
            IFS=',' read -ra pairs <<< "$FEATURE_FLAGS"
            for pair in "${pairs[@]}"; do
              [[ "$pair" =~ ^(ConversationAutoCreate|UseUpstreamKyc|UseUpstreamCdn|UseUpstreamOffer|UseUpstreamDelivery|UseUpstreamChat|Heartbeat)=(true|false)$ ]] \
                || fail "feature_flags contains a non-allowlisted pair"
            done
          fi

      - uses: actions/checkout@v4

      - name: Validate required credentials without printing values
        env:
          DB_HOST: ${{ secrets.JEEB_DB_HOST }}
          DB_PORT: ${{ secrets.JEEB_DB_PORT }}
          DB_USERNAME: ${{ secrets.JEEB_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.JEEB_DB_PASSWORD }}
          PUSH_KEY: ${{ secrets.JEEB_PUSH_INTERNAL_API_KEY }}
          JWT_KEY: ${{ secrets.JEEB_JWT_SIGNING_KEY }}
          UMJWT_KEY: ${{ secrets.UMJWT_SIGNING_KEY }}
          HEARTBEAT_KEY: ${{ secrets.HEARTBEAT_SERVICE_AUTH_KEY }}
        run: |
          set -euo pipefail
          : "${DB_HOST:?JEEB_DB_HOST is required}"
          : "${DB_PORT:?JEEB_DB_PORT is required}"
          : "${DB_USERNAME:?JEEB_DB_USERNAME is required}"
          : "${DB_PASSWORD:?JEEB_DB_PASSWORD is required}"
          : "${PUSH_KEY:?JEEB_PUSH_INTERNAL_API_KEY is required}"
          : "${JWT_KEY:?JEEB_JWT_SIGNING_KEY is required}"
          : "${UMJWT_KEY:?UMJWT_SIGNING_KEY is required}"
          : "${HEARTBEAT_KEY:?HEARTBEAT_SERVICE_AUTH_KEY is required}"

      - name: Install cloudflared and configure pinned SSH identity
        env:
          SSH_KEY_MATERIAL: ${{ secrets.JEEB_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS_MATERIAL: ${{ secrets.JEEB_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${SSH_KEY_MATERIAL:?JEEB_SSH_PRIVATE_KEY is required}"
          : "${KNOWN_HOSTS_MATERIAL:?JEEB_SSH_KNOWN_HOSTS is required}"
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb || sudo apt-get install -f -y
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if printf '%s' "$SSH_KEY_MATERIAL" | grep -q '^-----BEGIN'; then
            printf '%s\n' "$SSH_KEY_MATERIAL" > ~/.ssh/id_ed25519
          else
            printf '%s' "$SSH_KEY_MATERIAL" | base64 -d > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS_MATERIAL" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh-keygen -F "$DEPLOY_SERVER_HOSTNAME" -f ~/.ssh/known_hosts >/dev/null \
            || { echo "::error::pinned Jeeb host key is missing"; exit 1; }
          cat > ~/.ssh/config <<EOF
          Host jeeb
            HostName $DEPLOY_SERVER_HOSTNAME
            User $DEPLOY_SERVER_USER
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            HostKeyAlias $DEPLOY_SERVER_HOSTNAME
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Preflight gateway-only backend exposure (read-only)
        run: |
          set -euo pipefail
          evidence=$(ssh jeeb bash -se -- "$PRIVATE_PUSH_PORT" <<'REMOTE'
          set -euo pipefail
          port=$1
          public_if=$(ip -4 route show default | awk 'NR == 1 {print $5}')
          [[ "$public_if" =~ ^[A-Za-z0-9_.:-]+$ ]] || exit 1
          first_rule=$(sudo -n iptables -S DOCKER-USER | sed -n '/^-A /{p;q}')
          expected="-A DOCKER-USER -i $public_if -p tcp -m conntrack --ctorigdstport $port -j DROP"
          [[ "$first_rule" == "$expected" ]] || exit 1
          printf PRIVATE_PUSH_BLOCKED
          REMOTE
          )
          [[ "$evidence" == PRIVATE_PUSH_BLOCKED ]] \
            || { echo "::error::private push firewall policy is not proven before mutation"; exit 1; }
          public_ip=$(ssh jeeb 'curl -fsS --max-time 5 https://api.ipify.org' | tr -d '\r\n')
          [[ "$public_ip" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] \
            || { echo "::error::could not establish the DEV host public probe address"; exit 1; }
          if curl --silent --show-error --max-time 5 --output /dev/null \
            "http://${public_ip}:${PRIVATE_PUSH_PORT}/health"; then
            echo "::error::push backend is publicly reachable before deployment mutation"
            exit 1
          fi
          echo "Read-only gateway-only exposure preflight passed"

      - name: Capture strict rollback digest
        id: previous
        run: |
          set -euo pipefail
          RAW=$(ssh jeeb bash -se -- "$DEPLOY_SERVICE_NAME" <<'REMOTE'
          set -euo pipefail
          SVC=$1
          if IMAGE=$(docker service inspect --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' "$SVC" 2>/dev/null); then
            [[ -n "$IMAGE" ]] || { echo "running service has an empty image reference" >&2; exit 1; }
            printf '%s\n' "$IMAGE"
          else
            SERVICE_NAMES=$(docker service ls --format '{{.Name}}') \
              || { echo "could not list services after inspect failure" >&2; exit 1; }
            if grep -Fxq "$SVC" <<< "$SERVICE_NAMES"; then
              echo "service exists but its image could not be inspected" >&2
              exit 1
            fi
            printf '%s\n' none
          fi
          REMOTE
          )
          PREVIOUS_IMAGE=$(printf '%s' "$RAW" | tr -d '\r' | sed '/^[[:space:]]*$/d' | tail -n1)
          [[ -n "$PREVIOUS_IMAGE" ]] || { echo "::error::rollback capture returned no state"; exit 1; }
          if [[ "$PREVIOUS_IMAGE" != none ]]; then
            [[ "$PREVIOUS_IMAGE" =~ ^ghcr\.io/olivium-dev/jeeb-gateway(:sha-[0-9a-f]{12})?@sha256:[0-9a-f]{64}$ ]] \
              || { echo "::error::running gateway is not recorded by immutable digest"; exit 1; }
          fi
          echo "image=$PREVIOUS_IMAGE" >> "$GITHUB_OUTPUT"
          [[ "$PREVIOUS_IMAGE" == none ]] && echo 'service_existed=0' >> "$GITHUB_OUTPUT" || echo 'service_existed=1' >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR after read-only preflights
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | docker login "$DEPLOY_REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

      - name: Build, push, and verify immutable image digest
        id: build
        run: |
          set -euo pipefail
          IMAGE="$DEPLOY_REGISTRY/$IMAGE_REPOSITORY"
          TAG="$IMAGE:sha-${GITHUB_SHA::12}"
          docker build -t "$TAG" .
          docker push "$TAG"
          DIGEST=$(docker buildx imagetools inspect "$TAG" --format '{{.Manifest.Digest}}')
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "::error::invalid registry digest"; exit 1; }
          IMAGE_REF="$IMAGE@$DIGEST"
          docker pull "$IMAGE_REF" >/dev/null
          PULLED_REF=$(docker image inspect "$IMAGE_REF" --format '{{index .RepoDigests 0}}')
          [[ "$PULLED_REF" == "$IMAGE_REF" ]] || { echo "::error::pulled digest differs from pushed digest"; exit 1; }
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Remote GHCR login after read-only preflights
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | ssh jeeb docker login "$DEPLOY_REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Apply idempotent migrations without credential argv
        env:
          DB_HOST: ${{ secrets.JEEB_DB_HOST }}
          DB_PORT: ${{ secrets.JEEB_DB_PORT }}
          DB_USERNAME: ${{ secrets.JEEB_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.JEEB_DB_PASSWORD }}
        run: |
          set -euo pipefail
          : "${DB_HOST:?JEEB_DB_HOST is required}"
          : "${DB_PORT:?JEEB_DB_PORT is required}"
          : "${DB_USERNAME:?JEEB_DB_USERNAME is required}"
          : "${DB_PASSWORD:?JEEB_DB_PASSWORD is required}"
          [[ "$DB_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || { echo "::error::invalid DB host"; exit 1; }
          [[ "$DB_PORT" =~ ^[0-9]{1,5}$ ]] || { echo "::error::invalid DB port"; exit 1; }
          ((10#$DB_PORT >= 1 && 10#$DB_PORT <= 65535)) || { echo "::error::invalid DB port"; exit 1; }
          DB_USERNAME_ENCODED=$(printf '%s' "$DB_USERNAME" | jq -sRr @uri)
          DB_PASSWORD_ENCODED=$(printf '%s' "$DB_PASSWORD" | jq -sRr @uri)
          DATABASE_URL="postgresql://${DB_USERNAME_ENCODED}:${DB_PASSWORD_ENCODED}@${DB_HOST}:${DB_PORT}/${DEPLOY_DB_NAME}"
          unset DB_USERNAME DB_PASSWORD DB_USERNAME_ENCODED DB_PASSWORD_ENCODED
          PGSERVICE_FILE=$(mktemp)
          chmod 600 "$PGSERVICE_FILE"
          cleanup() { rm -f "$PGSERVICE_FILE"; }
          trap cleanup EXIT
          printf '[jeeb_gateway]\ndbname=%s\n' "$DATABASE_URL" > "$PGSERVICE_FILE"
          unset DATABASE_URL
          export PGSERVICEFILE="$PGSERVICE_FILE"
          shopt -s nullglob
          migrations=(db/migrations/*.sql)
          ((${#migrations[@]} > 0)) || { echo "::error::no migrations found"; exit 1; }
          for migration in "${migrations[@]}"; do
            echo "Applying $(basename "$migration")"
            psql 'service=jeeb_gateway' -v ON_ERROR_STOP=1 -f "$migration"
          done
          psql 'service=jeeb_gateway' -v ON_ERROR_STOP=1 -c 'SELECT 1' >/dev/null

      - name: Generate mode-600 native ASP.NET Core configuration
        id: runtime_config
        env:
          DB_HOST: ${{ secrets.JEEB_DB_HOST }}
          DB_PORT: ${{ secrets.JEEB_DB_PORT }}
          DB_USERNAME: ${{ secrets.JEEB_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.JEEB_DB_PASSWORD }}
          PUSH_INTERNAL_API_KEY: ${{ secrets.JEEB_PUSH_INTERNAL_API_KEY }}
          TOKEN_MINT_KEY: ${{ secrets.JEEB_TOKEN_MINT_KEY }}
          JWT_SIGNING_KEY: ${{ secrets.JEEB_JWT_SIGNING_KEY }}
          UMJWT_SIGNING_KEY: ${{ secrets.UMJWT_SIGNING_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEARTBEAT_AUTH_KEY: ${{ secrets.HEARTBEAT_SERVICE_AUTH_KEY }}
        run: |
          set -euo pipefail
          umask 077
          CONFIG_FILE=$(mktemp)
          MATERIAL_DIR=$(mktemp -d)
          chmod 600 "$CONFIG_FILE"
          cleanup() { rm -f "$CONFIG_FILE"; rm -rf "$MATERIAL_DIR"; }
          trap cleanup ERR
          : "${DB_HOST:?JEEB_DB_HOST is required}"
          : "${DB_PORT:?JEEB_DB_PORT is required}"
          : "${DB_USERNAME:?JEEB_DB_USERNAME is required}"
          : "${DB_PASSWORD:?JEEB_DB_PASSWORD is required}"
          [[ "$DB_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || { echo "::error::invalid DB host"; exit 1; }
          [[ "$DB_PORT" =~ ^[0-9]{1,5}$ ]] || { echo "::error::invalid DB port"; exit 1; }
          ((10#$DB_PORT >= 1 && 10#$DB_PORT <= 65535)) || { echo "::error::invalid DB port"; exit 1; }
          DB_USERNAME_ENCODED=$(printf '%s' "$DB_USERNAME" | jq -sRr @uri)
          DB_PASSWORD_ENCODED=$(printf '%s' "$DB_PASSWORD" | jq -sRr @uri)
          DATABASE_URL="postgresql://${DB_USERNAME_ENCODED}:${DB_PASSWORD_ENCODED}@${DB_HOST}:${DB_PORT}/${DEPLOY_DB_NAME}"
          unset DB_USERNAME DB_PASSWORD DB_USERNAME_ENCODED DB_PASSWORD_ENCODED
          printf '%s' "$DATABASE_URL" > "$MATERIAL_DIR/database_url"
          unset DATABASE_URL
          printf '%s' "$PUSH_INTERNAL_API_KEY" > "$MATERIAL_DIR/push_key"
          if [[ -n "$TOKEN_MINT_KEY" ]]; then
            printf '%s' "$TOKEN_MINT_KEY" > "$MATERIAL_DIR/token_mint_key"
          else
            printf '%s' "$JWT_SIGNING_KEY" > "$MATERIAL_DIR/token_mint_key"
          fi
          printf '%s' "$JWT_SIGNING_KEY" > "$MATERIAL_DIR/jwt_key"
          printf '%s' "$UMJWT_SIGNING_KEY" > "$MATERIAL_DIR/umjwt_key"
          printf '%s' "$OPENAI_KEY" > "$MATERIAL_DIR/openai_key"
          printf '%s' "$HEARTBEAT_AUTH_KEY" > "$MATERIAL_DIR/heartbeat_key"
          jq \
            --rawfile database_url "$MATERIAL_DIR/database_url" \
            --rawfile push_key "$MATERIAL_DIR/push_key" \
            --rawfile token_mint_key "$MATERIAL_DIR/token_mint_key" \
            --rawfile jwt_key "$MATERIAL_DIR/jwt_key" \
            --rawfile umjwt_key "$MATERIAL_DIR/umjwt_key" \
            --rawfile openai_key "$MATERIAL_DIR/openai_key" \
            --rawfile heartbeat_key "$MATERIAL_DIR/heartbeat_key" \
            '. * {
              Security: {TokenMint: {Enabled: true, Key: $token_mint_key}},
              Jwt: {SigningKey: $jwt_key},
              UmJwt: {SigningKey: $umjwt_key},
              PushNotificationServiceApi: {InternalApiKey: $push_key},
              Whisper: {ApiKey: $openai_key},
              FeatureFlags: {Heartbeat: {ServiceAuthKey: $heartbeat_key}},
              GatewayPostgres: {ConnectionString: $database_url}
            }' src/JeebGateway/appsettings.Production.json > "$CONFIG_FILE"
          jq -e . "$CONFIG_FILE" >/dev/null
          rm -rf "$MATERIAL_DIR"
          echo "path=$CONFIG_FILE" >> "$GITHUB_OUTPUT"
          trap - ERR

      - name: Create versioned appsettings Swarm secret over stdin
        id: runtime_secret
        env:
          CONFIG_FILE: ${{ steps.runtime_config.outputs.path }}
        run: |
          set -euo pipefail
          NEW_SECRET="${APPSETTINGS_SECRET_PREFIX}_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          [[ "$NEW_SECRET" =~ ^jeeb_gateway_appsettings_[0-9]+_[0-9]+$ ]] || exit 1
          [[ -f "$CONFIG_FILE" ]] || { echo "::error::runtime config is missing"; exit 1; }
          # shellcheck disable=SC2029 # The generated name is strictly validated.
          ssh jeeb docker secret inspect "$NEW_SECRET" >/dev/null 2>&1 \
            && { echo "::error::versioned secret already exists"; exit 1; }
          created=0
          cleanup() {
            rm -f "$CONFIG_FILE"
            # shellcheck disable=SC2029 # The generated name is strictly validated.
            if [[ "$created" == 1 ]]; then ssh jeeb docker secret rm "$NEW_SECRET" >/dev/null || true; fi
          }
          trap cleanup ERR
          # shellcheck disable=SC2029 # Value is stdin; only the validated name is argv.
          ssh jeeb docker secret create "$NEW_SECRET" - < "$CONFIG_FILE" >/dev/null
          created=1
          rm -f "$CONFIG_FILE"
          echo "name=$NEW_SECRET" >> "$GITHUB_OUTPUT"
          trap - ERR

      - name: In-place start-first gateway rollout
        id: rollout
        env:
          IMAGE_REF: ${{ steps.build.outputs.image_ref }}
          NEW_SECRET: ${{ steps.runtime_secret.outputs.name }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_REF" =~ ^ghcr\.io/olivium-dev/jeeb-gateway@sha256:[0-9a-f]{64}$ ]] || exit 1
          [[ "$NEW_SECRET" =~ ^jeeb_gateway_appsettings_[0-9]+_[0-9]+$ ]] || exit 1
          ssh jeeb bash -se -- \
            "$DEPLOY_SERVICE_NAME" "$DEPLOY_INTERNAL_PORT" "$DEPLOY_EXTERNAL_PORT" \
            "$IMAGE_REF" "$NEW_SECRET" "$JWT_ISSUER" "$JWT_AUDIENCE" \
            "$CHAT_BASE_URL" "$USER_MANAGEMENT_BASE_URL" "$WALLET_BASE_URL" \
            "$NOTIFICATION_BASE_URL" "$PUSH_BASE_URL" "$OTP_BASE_URL" \
            "$MATCHING_BASE_URL" "$DELIVERY_BASE_URL" "$OTP_APPLICATION_ID" \
            "$KYC_BASE_URL" "$CDN_BASE_URL" "$WHISPER_FAKE" "$DURABLE_REQUESTS" \
            "$DEV_ENDPOINTS" "$SWAGGER_UI" "$FEATURE_FLAGS" <<'REMOTE'
          set -euo pipefail
          SVC=$1; INT=$2; EXT=$3; IMAGE_REF=$4; NEW_SECRET=$5
          JWT_ISSUER=$6; JWT_AUDIENCE=$7; CHAT_URL=$8; USER_URL=$9; WALLET_URL=${10}
          NOTIFICATION_URL=${11}; PUSH_URL=${12}; OTP_URL=${13}; MATCHING_URL=${14}
          DELIVERY_URL=${15}; OTP_APP_ID=${16}; KYC_URL=${17}; CDN_URL=${18}
          WHISPER_FAKE=${19}; DURABLE=${20}; DEV_ENDPOINTS=${21}; SWAGGER_UI=${22}; RAW_FLAGS=${23}
          SECRET_TARGET=/app/appsettings.Production.json
          docker pull "$IMAGE_REF"
          docker network create --driver overlay --attachable jeeb-net 2>/dev/null || true
          APP_UID=$(docker run --rm --entrypoint /bin/sh "$IMAGE_REF" -c 'id -u appuser')
          APP_GID=$(docker run --rm --entrypoint /bin/sh "$IMAGE_REF" -c 'id -g appuser')
          [[ "$APP_UID" =~ ^[0-9]+$ && "$APP_GID" =~ ^[0-9]+$ ]] || exit 1

          common_env=(
            "ASPNETCORE_ENVIRONMENT=Production"
            "DOTNET_EnableWriteXorExecute=0"
            "Security__TokenMint__Enabled=true"
            "Jwt__Issuer=$JWT_ISSUER"
            "Jwt__Audience=$JWT_AUDIENCE"
            "UmJwt__Issuer=user-management"
            "UmJwt__Audience=user-management"
            "Services__Chat__BaseUrl=$CHAT_URL"
            "Services__UserManagement__BaseUrl=$USER_URL"
            "Services__Wallet__BaseUrl=$WALLET_URL"
            "Services__Notification__BaseUrl=$NOTIFICATION_URL"
            "PushNotificationServiceApi__BaseUrl=$PUSH_URL"
            "UserManagementApi__BaseUrl=$USER_URL"
            "Services__Matching__BaseUrl=$MATCHING_URL"
            "Services__Delivery__BaseUrl=$DELIVERY_URL"
            "ServiceOTPApi__BaseUrl=$OTP_URL"
            "Auth__Otp__ApplicationId=$OTP_APP_ID"
            "Services__Kyc__BaseUrl=$KYC_URL"
            "Services__Cdn__BaseUrl=$CDN_URL"
            "Whisper__FakeTranscribe=$WHISPER_FAKE"
            "FeatureFlags__DurableRequests__Enabled=$DURABLE"
            "FeatureFlags__UseUpstream__Offer=true"
            "FeatureFlags__UseUpstream__Delivery=true"
            "FeatureFlags__UseUpstream__Chat=true"
          )
          if [[ -n "$RAW_FLAGS" ]]; then
            IFS=',' read -ra pairs <<< "$RAW_FLAGS"
            for pair in "${pairs[@]}"; do
              key=${pair%%=*}; value=${pair#*=}
              case "$key" in
                ConversationAutoCreate) env_key=FeatureFlags__ConversationAutoCreate__Enabled ;;
                UseUpstreamKyc) env_key=FeatureFlags__UseUpstream__Kyc ;;
                UseUpstreamCdn) env_key=FeatureFlags__UseUpstream__Cdn ;;
                UseUpstreamOffer) env_key=FeatureFlags__UseUpstream__Offer ;;
                UseUpstreamDelivery) env_key=FeatureFlags__UseUpstream__Delivery ;;
                UseUpstreamChat) env_key=FeatureFlags__UseUpstream__Chat ;;
                Heartbeat) env_key=FeatureFlags__Heartbeat__Enabled ;;
                *) exit 64 ;;
              esac
              common_env+=("$env_key=$value")
            done
          fi

          if docker service inspect "$SVC" >/dev/null 2>&1; then
            mapfile -t port_rows < <(
              docker service inspect "$SVC" --format '{{range .Endpoint.Spec.Ports}}{{println .PublishedPort .TargetPort .PublishMode}}{{end}}' \
                | awk -v ext="$EXT" '$1 == ext {print}'
            )
            ((${#port_rows[@]} == 1)) || { echo "expected one gateway port mapping" >&2; exit 1; }
            publish_args=()
            case "${port_rows[0]}" in
              "$EXT $INT ingress") ;;
              "$EXT $INT host") publish_args=(--publish-rm "$INT" --publish-add "published=$EXT,target=$INT,mode=ingress") ;;
              *) echo "unexpected gateway port mapping" >&2; exit 1 ;;
            esac

            mapfile -t old_secrets < <(
              docker service inspect "$SVC" --format '{{range .Spec.TaskTemplate.ContainerSpec.Secrets}}{{if eq .File.Name "/app/appsettings.Production.json"}}{{println .SecretName}}{{end}}{{end}}' \
                | sed '/^[[:space:]]*$/d'
            )
            ((${#old_secrets[@]} <= 1)) || { echo "multiple appsettings targets" >&2; exit 1; }
            secret_args=(--secret-add "source=$NEW_SECRET,target=$SECRET_TARGET,uid=$APP_UID,gid=$APP_GID,mode=0400")
            [[ -z "${old_secrets[0]:-}" ]] || secret_args=(--secret-rm "${old_secrets[0]}" "${secret_args[@]}")

            current_env=$(docker service inspect "$SVC" --format '{{range .Spec.TaskTemplate.ContainerSpec.Env}}{{println .}}{{end}}')
            env_args=()
            forbidden_env_keys=(Security__TokenMint__Key Jwt__SigningKey Jwt__PhonePepper JeebJwt__SigningKey JeebJwt__PhonePepper JeebJwt__Issuer JeebJwt__Audience UmJwt__SigningKey PushNotificationServiceApi__InternalApiKey Whisper__ApiKey FeatureFlags__Heartbeat__ServiceAuthKey DATABASE_URL JEEB_DATABASE_URL GatewayPostgres__ConnectionString WalletPostgres__ConnectionString)
            for key in "${forbidden_env_keys[@]}"; do
              grep -q "^${key}=" <<< "$current_env" && env_args+=(--env-rm "$key")
            done
            for entry in "${common_env[@]}"; do env_args+=(--env-add "$entry"); done
            case "$DEV_ENDPOINTS" in
              true) env_args+=(--env-add Features__DevEndpoints__Enabled=true) ;;
              false) grep -q '^Features__DevEndpoints__Enabled=' <<< "$current_env" && env_args+=(--env-rm Features__DevEndpoints__Enabled) ;;
            esac
            case "$SWAGGER_UI" in
              true) env_args+=(--env-add Features__Swagger__Enabled=true) ;;
              false) grep -q '^Features__Swagger__Enabled=' <<< "$current_env" && env_args+=(--env-rm Features__Swagger__Enabled) ;;
            esac
            docker service update --image "$IMAGE_REF" --with-registry-auth \
              "${publish_args[@]}" "${secret_args[@]}" "${env_args[@]}" \
              --update-order start-first --update-failure-action rollback \
              --rollback-order start-first --update-monitor 20s "$SVC"
          else
            create_env=()
            for entry in "${common_env[@]}"; do create_env+=(--env "$entry"); done
            [[ "$DEV_ENDPOINTS" == true ]] && create_env+=(--env Features__DevEndpoints__Enabled=true)
            [[ "$SWAGGER_UI" == true ]] && create_env+=(--env Features__Swagger__Enabled=true)
            docker service create --name "$SVC" --replicas 1 --network jeeb-net \
              --publish "published=$EXT,target=$INT,mode=ingress" --with-registry-auth \
              --secret "source=$NEW_SECRET,target=$SECRET_TARGET,uid=$APP_UID,gid=$APP_GID,mode=0400" \
              --update-order start-first --update-failure-action rollback --rollback-order start-first \
              "${create_env[@]}" --reserve-memory 256M "$IMAGE_REF"
          fi
          REMOTE

      - name: Bounded readiness and immutable-image gate
        id: health
        env:
          IMAGE_REF: ${{ steps.build.outputs.image_ref }}
        run: |
          set -euo pipefail
          ok=false
          for attempt in $(seq 1 30); do
            # shellcheck disable=SC2029 # Port and path are exact DEV allowlist values.
            if ssh jeeb "curl -fsS --max-time 5 http://localhost:${DEPLOY_EXTERNAL_PORT}${DEPLOY_HEALTH_PATH} >/dev/null"; then
              ok=true
              break
            fi
            echo "health attempt $attempt"
            sleep 4
          done
          [[ "$ok" == true ]] || { echo "::error::readiness gate failed"; exit 1; }
          ACTIVE=$(ssh jeeb docker service inspect --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' "$DEPLOY_SERVICE_NAME" | tr -d '\r' | tail -n1)
          [[ "$ACTIVE" == "$IMAGE_REF" ]] || { echo "::error::active image differs from verified digest"; exit 1; }

      - name: Stabilize rollback generation and recheck health
        id: stabilization
        env:
          NEW_SECRET: ${{ steps.runtime_secret.outputs.name }}
        run: |
          set -euo pipefail
          ssh jeeb bash -se -- stabilize "$DEPLOY_SERVICE_NAME" "$NEW_SECRET" \
            < .github/scripts/jeeb-gateway-secret-lifecycle.sh
          # shellcheck disable=SC2029 # Port and path are exact DEV allowlist values.
          ssh jeeb "curl -fsS --max-time 5 http://localhost:${DEPLOY_EXTERNAL_PORT}${DEPLOY_HEALTH_PATH} >/dev/null"
          ssh jeeb bash -se -- verify-safe "$DEPLOY_SERVICE_NAME" "$NEW_SECRET" \
            < .github/scripts/jeeb-gateway-secret-lifecycle.sh

      - name: Verify gateway is the sole public ingress
        id: exposure
        run: |
          set -euo pipefail
          evidence=$(ssh jeeb bash -se -- "$PRIVATE_PUSH_PORT" <<'REMOTE'
          set -euo pipefail
          port=$1
          public_if=$(ip -4 route show default | awk 'NR == 1 {print $5}')
          [[ "$public_if" =~ ^[A-Za-z0-9_.:-]+$ ]] || exit 1
          first_rule=$(sudo -n iptables -S DOCKER-USER | sed -n '/^-A /{p;q}')
          expected="-A DOCKER-USER -i $public_if -p tcp -m conntrack --ctorigdstport $port -j DROP"
          [[ "$first_rule" == "$expected" ]] || exit 1
          printf PRIVATE_PUSH_BLOCKED
          REMOTE
          )
          [[ "$evidence" == PRIVATE_PUSH_BLOCKED ]] || { echo "::error::private push firewall policy is not proven"; exit 1; }
          public_ip=$(ssh jeeb 'curl -fsS --max-time 5 https://api.ipify.org' | tr -d '\r\n')
          [[ "$public_ip" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] || exit 1
          curl -fsS --max-time 8 "http://${public_ip}:${DEPLOY_EXTERNAL_PORT}${DEPLOY_HEALTH_PATH}" >/dev/null
          if curl --silent --show-error --max-time 5 --output /dev/null "http://${public_ip}:${PRIVATE_PUSH_PORT}/health"; then
            echo "::error::push backend is publicly reachable"
            exit 1
          fi

      - name: Recover failed rollout to captured digest
        if: ${{ always() }}
        env:
          SECRET_OUTCOME: ${{ steps.runtime_secret.outcome }}
          ROLLOUT_OUTCOME: ${{ steps.rollout.outcome }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          STABILIZATION_OUTCOME: ${{ steps.stabilization.outcome }}
          EXPOSURE_OUTCOME: ${{ steps.exposure.outcome }}
          SERVICE_EXISTED: ${{ steps.previous.outputs.service_existed }}
          PREVIOUS_IMAGE: ${{ steps.previous.outputs.image }}
          ATTEMPTED_IMAGE: ${{ steps.build.outputs.image_ref }}
          NEW_SECRET: ${{ steps.runtime_secret.outputs.name }}
        run: |
          set -euo pipefail
          [[ "$SECRET_OUTCOME" == success ]] || exit 0
          if [[ "$ROLLOUT_OUTCOME" == success && "$HEALTH_OUTCOME" == success && "$STABILIZATION_OUTCOME" == success && "$EXPOSURE_OUTCOME" == success ]]; then
            exit 0
          fi
          [[ "$SERVICE_EXISTED" == 0 || "$SERVICE_EXISTED" == 1 ]] || exit 1
          [[ "$NEW_SECRET" =~ ^jeeb_gateway_appsettings_[0-9]+_[0-9]+$ ]] || exit 1
          [[ "$ATTEMPTED_IMAGE" =~ ^ghcr\.io/olivium-dev/jeeb-gateway@sha256:[0-9a-f]{64}$ ]] || exit 1
          if [[ "$SERVICE_EXISTED" == 1 ]]; then
            [[ "$PREVIOUS_IMAGE" =~ ^ghcr\.io/olivium-dev/jeeb-gateway(:sha-[0-9a-f]{12})?@sha256:[0-9a-f]{64}$ ]] || exit 1
          fi
          ssh jeeb bash -se -- finalize "$SERVICE_EXISTED" "$DEPLOY_SERVICE_NAME" \
            "$NEW_SECRET" "$PREVIOUS_IMAGE" "$ATTEMPTED_IMAGE" \
            < .github/scripts/jeeb-gateway-secret-lifecycle.sh

      - name: Garbage-collect exact unreferenced appsettings secrets
        if: ${{ steps.rollout.outcome == 'success' && steps.health.outcome == 'success' && steps.stabilization.outcome == 'success' && steps.exposure.outcome == 'success' }}
        run: |
          set -euo pipefail
          ssh jeeb bash -se -- gc "$DEPLOY_SERVICE_NAME" \
            < .github/scripts/jeeb-gateway-secret-lifecycle.sh
